# Box SMTP (server + client) — deploy on the mail server (smtp.mailtro.site).
# Both services share the same box.yml (joint volume) and the same image.
# TLS keys live OUTSIDE the repo and are mounted read-only into /keys —
# point tls.key / tls.cert in box.yml at /keys/....
#
# Host networking: box-server listens directly on host :25; RabbitMQ is
# reached via localhost (or a public host set in box.yml if remote).
# BOX_SRC = path to the box source checkout (default: ../../../box).
services:
  box-server:
    build: ${BOX_SRC:-../../../box}
    image: mailtro-box
    container_name: box-server
    network_mode: host
    environment:
      MODE: server
    volumes:
      - ./box.yml:/etc/box.yml:ro
      - ${BOX_KEYS_DIR:-./keys}:/keys:ro
      - box-log:/log
    restart: unless-stopped

  box-client:
    image: mailtro-box
    container_name: box-client
    network_mode: host
    depends_on:
      - box-server
    environment:
      MODE: client
    volumes:
      - ./box.yml:/etc/box.yml:ro
      - ${BOX_KEYS_DIR:-./keys}:/keys:ro
      - box-log:/log
    restart: unless-stopped

volumes:
  box-log:
