# Application: Go API backend + embedded React frontend.
# Host networking — Go server listens on host :3000 and serves both the API and frontend.
# Infra must be running first:
#   docker compose -f docker-compose.infra.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the frontend bundle during the Docker build
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}

    container_name: mailtro

    network_mode: host

    environment:
      # Database
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-mailtro}
      DB_SSLMODE: disable

      # Server
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

      # RabbitMQ
      AMQP_HOST: localhost
      AMQP_PORT: "5672"
      AMQP_USER: ${AMQP_USER:-mailtro}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-mailtro}

      # Queue names
      QUEUE_RECEIVER: ${QUEUE_RECEIVER:-box-receiver-1}
      QUEUE_SENDER: ${QUEUE_SENDER:-box-sender-1}
      QUEUE_STATUS: ${QUEUE_STATUS:-box-status-1}

      # DNS identity
      MX_HOSTS: ${MX_HOSTS:-smtp.mailtro.site}
      SPF_INCLUDE: ${SPF_INCLUDE:-_spf.mailtro.site}
      VERIFY_ZONE: ${VERIFY_ZONE:-verify.mailtro.site}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-smtp.mailtro.site}

      # Delivery retry
      RETRY_DELAY_MINUTES: ${RETRY_DELAY_MINUTES:-6}
      MAX_RETRIES: ${MAX_RETRIES:-5}

    restart: unless-stopped
