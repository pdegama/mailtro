# Box SMTP config for Mailtro — mounted into both box-server and box-client
# at /etc/box.yml (joint volume, see docker-compose.yml in this folder).
name: Mailtro Box SMTP
hostname: smtp.mailtro.site
max_clients: 10

port: 25

tls:
  starttls: true
  # keys are mounted from OUTSIDE the repo into /keys (read-only volume)
  key: /keys/privkey.pem
  cert: /keys/fullchain.pem

spf_check: true
message_size: 10240000
max_recipients: -1
# mailbox existence is checked by the mailtro backend when consuming the queue
check_mailbox: false

# incoming mail -> receiver queue (mailtro backend consumes this)
amqp_conf:
  host: localhost           # host networking; use public host if remote
  port: 5672
  username: mailtro
  password: mailtro
  queue: box-receiver-1     # = QUEUE_RECEIVER in mailtro backend env

client:
  hostname: smtp.mailtro.site
  worker: 2
  log_dir: /log
  log_file: client.log

  # outgoing mail <- sender queue (mailtro backend publishes),
  # delivery results -> status queue (mailtro backend consumes)
  amqp_conf:
    host: localhost         # host networking; use public host if remote
    port: 5672
    username: mailtro
    password: mailtro
    queue: box-sender-1     # = QUEUE_SENDER
    status_queue: box-status-1  # = QUEUE_STATUS

log_dir: /log
log_file: server.log
dev: false
