# Infrastructure: PostgreSQL + RabbitMQ (shared by the app and box SMTP).
# All services use host networking — they listen directly on the host:
# postgres :5432, rabbitmq :5672 (+ :15672 management).
services:
  postgres:
    image: postgres:15-alpine
    container_name: mailtro-postgres
    network_mode: host
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mailtro}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mailtro-rabbitmq
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: ${AMQP_USER:-mailtro}
      RABBITMQ_DEFAULT_PASS: ${AMQP_PASSWORD:-mailtro}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmq-data:
