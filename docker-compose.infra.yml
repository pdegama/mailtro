# Infrastructure: PostgreSQL + RabbitMQ (shared by the app and box SMTP).
# Create the shared network once:  docker network create mailtro
services:
  postgres:
    image: postgres:15-alpine
    container_name: mailtro-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mailtro}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mailtro
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mailtro-rabbitmq
    ports:
      - "5672:5672"   # AMQP — box SMTP server/client connect here too
      - "15672:15672" # management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${AMQP_USER:-mailtro}
      RABBITMQ_DEFAULT_PASS: ${AMQP_PASSWORD:-mailtro}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - mailtro
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmq-data:

networks:
  mailtro:
    external: true
